schema: spec-driven

context: |
  Project: skills-catalog
  Purpose: Skill catalog and eval runner migration work with spec-driven changes.
  Tech stack: <stack>
  Key constraints: <important constraints only>
  Preferred change style: minimal diff, preserve brownfield constraints.

rules:
  proposal:
    - Keep scope explicit and atomic; define out-of-scope and success criteria.
    - If scope is broad, split it into multiple reviewable changes.
    - Record assumptions explicitly when repo context does not settle them.
  specs:
    - Write normative requirements using SHALL or MUST.
    - Every requirement MUST include at least one Scenario with WHEN/THEN.
    - Use canonical names for capabilities, folders, and change identifiers.
  design:
    - Record key decisions with rationale, alternatives, and trade-offs.
    - Preserve brownfield constraints and minimal-diff expectations.
    - Call out risks and rollback notes when the change can fail partially.
  tasks:
    - Use strict checkbox format: < - [ ] X.Y Task description.
    - Keep tasks session-sized and dependency-ordered.
    - Define verification commands and expected evidence when the repo needs them.
    - Record concise evidence in openspec/changes/<slug>/tasks.md.