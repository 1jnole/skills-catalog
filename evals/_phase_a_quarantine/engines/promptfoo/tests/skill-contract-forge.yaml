- description: new-skill-one-clear-job
  vars:
    skill_prompt: file://../../../packs/core/skill-contract-forge/SKILL.md
    case_id: new-skill-one-clear-job
    prompt: Create a new reusable skill for spotting JavaScript array mutation mistakes. Start from the contract, keep one job only, and do not implement eval runtime behavior.
    expected_output: Treat the request as a new-skill authoring workflow, freeze the contract before writing instructions, and stop at Eval Brief ready.
    expected_stop: Eval Brief ready
    should_trigger: true
    assertions_json: '["must classify this as a new-skill workflow","must define the contract before final skill instructions","must stop before eval runtime implementation"]'
    assertion_rules_json: '[{"markers":["workflow: new-skill"]},{"markers":["contract","before","instructions"]},null]'
  metadata:
    skill_name: skill-contract-forge
    case_bucket: golden
    expected_stop: Eval Brief ready

