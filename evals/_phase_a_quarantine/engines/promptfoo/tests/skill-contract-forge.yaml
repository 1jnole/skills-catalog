    expected_output: Do not trigger skill-contract-forge because this is repository policy work, not skill authoring.
    expected_stop: do_not_trigger
    should_trigger: false
    assertions_json: '["must classify AGENTS work as out of scope","must avoid rewriting the task as a skill request","must avoid producing an Eval Brief"]'
    assertion_rules_json: '[{"markers":["out of scope","agents"]},null,{"markers":["eval brief ready"],"absent":true}]'
  metadata:
    skill_name: skill-contract-forge
    case_bucket: negative
    expected_stop: do_not_trigger

