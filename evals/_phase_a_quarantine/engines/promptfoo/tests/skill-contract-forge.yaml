- description: mixed-authoring-and-eval-request
  vars:
    skill_prompt: file://../../../packs/core/skill-contract-forge/SKILL.md
    case_id: mixed-authoring-and-eval-request
    prompt: Write a new skill for PR review routing and also set up the first eval scaffold for it. I want the skill contract first, but please leave the runtime for later.
    expected_output: Handle the authoring part, call out that eval work is downstream, and stop at Eval Brief ready instead of implementing the scaffold.
    expected_stop: Eval Brief ready
    should_trigger: true
    assertions_json: '["must preserve skill authoring as the active responsibility","must explicitly defer eval scaffold implementation","must not invent runner, grading, or benchmark behavior"]'
    assertion_rules_json: '[null,{"markers":["downstream","out of scope"]},{"markers":["runner","grading","benchmark"],"absent":true}]'
  metadata:
    skill_name: skill-contract-forge
    case_bucket: golden
    expected_stop: Eval Brief ready

- description: agents-policy-request
