- description: agents-policy-request
  vars:
    skill_prompt: file://../../../packs/core/skill-forge/SKILL.md
    case_id: agents-policy-request
    prompt: Update the repo AGENTS.md managed block and tighten the repository policy wording.
    expected_stop: do_not_trigger
    should_trigger: false
  metadata:
    skill_name: skill-forge
    case_bucket: negative
    expected_stop: do_not_trigger
  assert:
    - type: starts-with
      value: "Classification: non-trigger"
    - type: icontains
      value: "Out of scope for skill-forge."
    - type: icontains-any
      value:
        - "AGENTS"
        - "repository policy"
    - type: not-icontains
      value: "Classification: trigger"
    - type: not-icontains
      value: "Classification: stop-and-ask"

