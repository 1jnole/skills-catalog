- description: ambiguous-multi-workflow-request
  vars:
    skill_prompt: file://../../../packs/core/skill-forge/SKILL.md
    case_id: ambiguous-multi-workflow-request
    prompt: Create a skill, reorganize the repo policies, and build the first runner in one pass so everything lands together.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-forge
    case_bucket: negative
    expected_stop: stop_and_ask
  threshold: 1
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: starts-with
          metric: classification
          value: "Classification: stop-and-ask"
        - type: icontains
          metric: stop_marker
          value: "Scope clarification required."
        - type: icontains
          metric: ambiguity_reason
          value: "multiple"
        - type: icontains-any
          metric: ambiguity_shape
          value:
            - "multiple workflows"
            - "multiple independent workflows"
        - type: not-icontains
          metric: incompatible_trigger
          value: "Classification: trigger"
        - type: not-icontains
          metric: incompatible_non_trigger
          value: "Classification: non-trigger"

- description: ambiguous-refactor-missing-target
  vars:
    skill_prompt: file://../../../packs/core/skill-forge/SKILL.md
    case_id: ambiguous-refactor-missing-target
    prompt: Refactor this skill so the contract is clearer, keep it contract-first, and stop at Eval Brief ready.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-forge
    case_bucket: regression
    expected_stop: stop_and_ask
  threshold: 1
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: starts-with
          metric: classification
          value: "Classification: stop-and-ask"
        - type: icontains
          metric: stop_marker
          value: "Scope clarification required."
        - type: icontains-any
          metric: ambiguity_reason
          value:
            - "skill target"
            - "target skill"
            - "unclear"
        - type: not-icontains
          metric: incompatible_trigger
          value: "Classification: trigger"
        - type: not-icontains
          metric: incompatible_non_trigger
          value: "Classification: non-trigger"
