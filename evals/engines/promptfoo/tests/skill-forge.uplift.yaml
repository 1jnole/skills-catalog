- description: new-skill-one-clear-job
  vars:
    skill_prompt: file://../../../packs/core/skill-forge/SKILL.md
    case_id: new-skill-one-clear-job
    prompt: Create a new reusable skill for spotting JavaScript array mutation mistakes. Start from the contract, keep one job only, and do not implement eval runtime behavior.
    expected_stop: Eval Brief ready
    should_trigger: true
  metadata:
    skill_name: skill-forge
    case_bucket: golden
    expected_stop: Eval Brief ready
  assert:
    - type: starts-with
      value: "Classification: trigger"
    - type: icontains
      value: "Workflow: new-skill"
    - type: icontains
      value: "Freeze the contract before final instructions."
    - type: icontains
      value: "Eval Brief ready"
    - type: not-icontains
      value: "Classification: non-trigger"
    - type: not-icontains
      value: "Classification: stop-and-ask"

- description: existing-skill-refactor-clear-target
  vars:
    skill_prompt: file://../../../packs/core/skill-forge/SKILL.md
    case_id: existing-skill-refactor-clear-target
    prompt: Refactor the existing skill `skill-eval-forge`. First map what it does now, compare it to the blueprint, then produce the correct boundary artifact without implementing runtime behavior.
    expected_stop: Eval Brief ready
    should_trigger: true
  metadata:
    skill_name: skill-forge
    case_bucket: golden
    expected_stop: Eval Brief ready
  assert:
    - type: starts-with
      value: "Classification: trigger"
    - type: icontains
      value: "Workflow: existing-skill-refactor"
    - type: icontains-any
      value:
        - "Freeze the contract before final instructions."
        - "contract-first"
    - type: icontains
      value: "Eval Brief ready"
    - type: not-icontains
      value: "Classification: non-trigger"
    - type: not-icontains
      value: "Classification: stop-and-ask"

