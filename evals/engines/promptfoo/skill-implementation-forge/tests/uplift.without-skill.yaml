- description: new-skill-from-frozen-brief
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: new-skill-from-frozen-brief
    prompt: Implement the new skill `skill-eval-forge` from this frozen Eval Brief and stop at `Skill implementation ready`.
    expected_stop: baseline_only
    should_trigger: false
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: golden
    expected_stop: baseline_only
  assert:
    - type: assert-set
      metric: baseline_surface
      threshold: 1
      assert:
        - type: not-icontains
          metric: no_terminal_marker
          value: Skill implementation ready
        - type: not-icontains
          metric: no_implementation_surface
          value: SKILL.md
        - type: not-icontains
          metric: no_contract_authority_phrase
          value: approved contract artifact
