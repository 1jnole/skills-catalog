- description: new-skill-from-frozen-brief
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: new-skill-from-frozen-brief
    prompt: Implement the new skill `skill-eval-forge` from this frozen Eval Brief and stop at `Skill implementation ready`.
    expected_stop: Skill implementation ready
    should_trigger: true
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: golden
    expected_stop: Skill implementation ready
  assert:
    - type: assert-set
      metric: critical_uplift
      threshold: 1
      assert:
        - type: icontains
          metric: terminal_marker
          value: Skill implementation ready
        - type: icontains-any
          metric: contract_authority
          value:
            - frozen Eval Brief
            - approved contract artifact
            - approved contract
        - type: icontains
          metric: implementation_surface
          value: SKILL.md
- description: existing-skill-refactor-from-approved-contract
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: existing-skill-refactor-from-approved-contract
    prompt: Refactor `openspec-bootstrap` from its approved contract artifact without touching downstream evals.
    expected_stop: Skill implementation ready
    should_trigger: true
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: golden
    expected_stop: Skill implementation ready
  assert:
    - type: assert-set
      metric: critical_uplift
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: openspec-bootstrap
        - type: icontains
          metric: terminal_marker
          value: Skill implementation ready
- description: downstream-eval-explicitly-deferred
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: downstream-eval-explicitly-deferred
    prompt: Implement `example-skill` from this approved contract artifact. We will author Promptfoo-native eval suites later.
    expected_stop: Skill implementation ready
    should_trigger: true
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: regression
    expected_stop: Skill implementation ready
  assert:
    - type: assert-set
      metric: critical_uplift
      threshold: 1
      assert:
        - type: icontains-any
          metric: defer_eval_work
          value:
            - defer
            - later
        - type: icontains
          metric: terminal_marker
          value: Skill implementation ready
- description: contract-authoring-request
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: contract-authoring-request
    prompt: Define the contract for a new skill.
    expected_stop: do_not_trigger
    should_trigger: false
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: negative
    expected_stop: do_not_trigger
  assert:
    - type: assert-set
      metric: out_of_scope_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: out_of_scope_marker
          value:
            - out of scope
            - outside the scope
            - does not cover
        - type: not-icontains
          metric: terminal_absent
          value: Skill implementation ready
- description: missing-contract
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: missing-contract
    prompt: Implement `example-skill`.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: negative
    expected_stop: stop_and_ask
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: stop_marker
          value:
            - clarify
            - please provide
            - please specify
        - type: icontains-any
          metric: ambiguity_reason
          value:
            - contract
            - approved contract artifact
        - type: not-icontains
          metric: terminal_absent
          value: Skill implementation ready
- description: deictic-target
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: deictic-target
    prompt: Implement this skill from the approved brief.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: regression
    expected_stop: stop_and_ask
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: stop_marker
          value:
            - clarify
            - please provide
            - please specify
        - type: icontains-any
          metric: ambiguity_reason
          value:
            - target skill
            - this skill
        - type: not-icontains
          metric: terminal_absent
          value: Skill implementation ready

