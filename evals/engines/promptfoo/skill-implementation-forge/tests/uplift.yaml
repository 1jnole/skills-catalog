    prompt: 'Implement `release-notes-skill` from the approved contract artifact attached to this request. The uploaded artifact is already accessible and verifiable in the current working context even though no repo path or file:// locator is provided. The artifact freezes canonical `skill.name`, canonical `skill.description`, and `authoring.packageShape` with `requiredFiles: ["SKILL.md"]` plus `supportFolders: []`. Keep this to implementation-from-contract, run `npm run validate:skill-metadata`, and stop at the normal completion marker for this phase.'
