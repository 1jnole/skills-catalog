- description: refactor-existing-skill-from-authoritative-contract
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: refactor-existing-skill-from-authoritative-contract
    prompt: >-
      Refactor `skill-eval-forge`.
      Use the approved contract artifact at `openspec/specs/skill-eval-forge/spec.md`.
      The target skill already exists at `packs/core/skill-eval-forge/SKILL.md`.
      Those repo-local inputs are already confirmed and available now, so do not ask to reconfirm them.
      Keep downstream eval authoring and eval/runtime changes out of scope.
      Proceed from that authoritative contract input and stop at the normal completion marker for this phase.
    expected_stop: Skill implementation ready
    should_trigger: true
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: golden
    expected_stop: Skill implementation ready
  assert:
    - type: assert-set
      metric: critical_uplift
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: skill-eval-forge
        - type: icontains-any
          metric: contract_authority
          value:
            - contract artifact
            - approved contract artifact
            - authoritative contract
        - type: icontains
          metric: terminal_marker
          value: Skill implementation ready
- description: new-skill-artifact-mentioned-only
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: new-skill-artifact-mentioned-only
    prompt: Implement the new skill `skill-eval-forge` from the frozen Eval Brief I mentioned, but I am not including that brief or a repo-local path here.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: regression
    expected_stop: stop_and_ask
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: stop_marker
          value:
            - clarify
            - please provide
            - please share
            - please specify
        - type: icontains-any
          metric: ambiguity_reason
          value:
            - frozen Eval Brief
            - approved contract artifact
            - not included
            - not provided
            - repo-local path
        - type: not-icontains
          metric: terminal_absent
          value: Skill implementation ready
- description: deictic-target-with-authoritative-contract
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: deictic-target-with-authoritative-contract
    prompt: >-
      Implement this skill from the approved contract artifact at `openspec/specs/skill-eval-forge/spec.md`.
      For this evaluation, treat that repo-local contract artifact as already opened and operationally inspectable authority.
      The only ambiguity left in the request is the deictic target phrase `this skill`.
      Stop at the normal completion marker for this phase only if the request is truly in trigger scope.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: regression
    expected_stop: stop_and_ask
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: stop_marker
          value:
            - clarify
            - please provide
            - please specify
        - type: icontains-any
          metric: ambiguity_reason
          value:
            - target skill
            - clearly identify
            - this skill
        - type: not-icontains-any
          metric: no_fake_access_blocker
          value:
            - not accessible in this environment
            - please provide the full content
            - cannot access that path here
        - type: not-icontains
          metric: terminal_absent
          value: Skill implementation ready
