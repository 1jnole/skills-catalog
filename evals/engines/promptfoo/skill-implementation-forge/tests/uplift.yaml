# Acceptance criteria
# - Measure the behavioral uplift of the skill over the baseline, not repetition of older path-centric wording.
# - Keep trigger, stop-and-ask, and phase-boundary checks that demonstrate real skill activation.
# - Prefer behaviorally meaningful authority checks over exact repo-path phrasing.
- description: refactor-existing-skill-from-authoritative-contract
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: refactor-existing-skill-from-authoritative-contract
    prompt: Refactor `skill-eval-forge`. Use the approved contract artifact at `openspec/specs/skill-eval-forge/spec.md`. That approved contract already freezes canonical `skill.name` and `skill.description` for the target skill. The target skill already exists at `packs/core/skill-eval-forge/SKILL.md`. Those authorities are already available in the current working context, so do not ask to reconfirm them. Keep downstream eval authoring and eval/runtime changes out of scope. Run `npm run validate:skill-metadata` before using the normal completion marker for this phase. Proceed from that authoritative contract input and stop at the normal completion marker for this phase.
    expected_stop: Skill implementation ready
    should_trigger: true
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: golden
    expected_stop: Skill implementation ready
    intent_class: trigger
    authority_mode: materialized
  assert:
  - type: assert-set
    metric: critical_uplift
    threshold: 1
    assert:
    - type: icontains
      metric: trigger_marker
      value: 'Result: trigger'
    - type: icontains
      metric: target_skill
      value: skill-eval-forge
    - type: icontains-any
      metric: contract_authority
      value:
      - contract artifact
      - approved contract artifact
      - openspec/specs/skill-eval-forge/spec.md
    - type: icontains
      metric: terminal_marker
      value: Skill implementation ready
