- description: new-skill-from-frozen-brief
  vars:
    skill_prompt: file://../../../../packs/core/skill-implementation-forge/SKILL.md
    case_id: new-skill-from-frozen-brief
    prompt: Implement the new skill `skill-eval-forge` from this frozen Eval Brief and stop at `Skill implementation ready`. Do not author downstream evals or change runtime architecture.
    expected_stop: Skill implementation ready
    should_trigger: true
  metadata:
    skill_name: skill-implementation-forge
    case_bucket: golden
    expected_stop: Skill implementation ready
  assert:
    - type: assert-set
      metric: critical_contract
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: skill-eval-forge
        - type: icontains-any
          metric: contract_authority
          value:
            - frozen Eval Brief
            - approved contract artifact
            - approved contract
        - type: icontains
          metric: implementation_surface
          value: SKILL.md
        - type: icontains
          metric: terminal_marker
          value: Skill implementation ready
