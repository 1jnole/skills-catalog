      - current working context
      - artifact reference
      - approved contract artifact
      - existing implementation
    - type: icontains-any
      metric: implementation_scope
      value:
      - implement
      - implementation
      - refactor
    - type: icontains-any
      metric: frontmatter_authority
      value:
      - skill.name
      - skill.description
      - canonical
      - frontmatter
    - type: icontains-any
      metric: validation_gate
      value:
      - npm run validate:skill-metadata
      - validate:skill-metadata
      - skill metadata validation
    - type: not-icontains
      metric: no_stop_and_ask
