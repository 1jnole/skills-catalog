description: Canonical Promptfoo-first suite for skill-forge
prompts:
  - label: with_skill
    raw: file://prompts/with-skill.txt
  - label: without_skill
    raw: file://prompts/without-skill.txt
providers:
  - openai:gpt-4.1-mini
defaultTest:
  vars:
    case_score_threshold: 0.75
  assert:
    - type: javascript
      value: file://support/assertions.cjs:gradeSkillForgeCase
tests: file://tests/skill-forge.yaml
