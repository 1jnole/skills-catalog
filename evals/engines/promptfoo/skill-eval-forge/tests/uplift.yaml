- description: uplift-reads-durable-support-from-implemented-package
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: uplift-reads-durable-support-from-implemented-package
    prompt: >-
      Author eval coverage for `planner`.
      Use the approved brief artifact at `notes/planner-brief.json`,
      the implemented skill package at `packs/core/planner/SKILL.md`,
      and the active Promptfoo eval context under `evals/engines/promptfoo/planner/`.
      The approved brief froze `references/` for examples and `assets/` for templates.
      Read that durable support content from the implemented package and do not require the original authoring notes at `notes/planner-authoring-notes.md`.
      Proceed from those authorities and stop at the normal completion marker for this phase.
    expected_stop: Skill eval ready
    should_trigger: true
  metadata:
    skill_name: skill-eval-forge
    case_bucket: regression
    intent_class: trigger
    authority_mode: materialized
    shape_mode: frozen_support_material
    expected_stop: Skill eval ready
  assert:
    - type: assert-set
      metric: critical_uplift
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: planner
        - type: icontains-any
          metric: durable_support_routing
          value:
            - references
            - assets
            - implementation
            - package
            - support content
            - support material
            - implemented skill package
        - type: not-icontains
          metric: no_classification_header
          value: "Classification:"
        - type: not-icontains
          metric: no_workflow_header
          value: "Workflow:"
