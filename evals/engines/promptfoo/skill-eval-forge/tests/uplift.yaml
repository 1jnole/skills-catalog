    expected_stop: do_not_trigger
    should_trigger: false
  metadata:
    skill_name: skill-eval-forge
    case_bucket: negative
    expected_stop: do_not_trigger
  assert:
    - type: assert-set
      metric: out_of_scope_behavior
      threshold: 1
