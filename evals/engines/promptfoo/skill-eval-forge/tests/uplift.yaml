- description: author-evals-from-approved-contract-and-implementation
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: author-evals-from-approved-contract-and-implementation
    prompt: >-
      Author Promptfoo-native eval coverage for `skill-implementation-forge`.
      Use the approved contract artifact at `openspec/specs/skill-implementation-forge/spec.md`,
      the existing implementation at `packs/core/skill-implementation-forge/SKILL.md`,
      and the active Promptfoo eval context under `evals/engines/promptfoo/skill-implementation-forge/`.
      Those repo-local inputs are already confirmed and available now, so do not ask to reconfirm them.
      Proceed from those authoritative inputs and stop at `Skill eval ready`.
    expected_stop: Skill eval ready
    should_trigger: true
  metadata:
    skill_name: skill-eval-forge
    case_bucket: golden
    expected_stop: Skill eval ready
  assert:
    - type: assert-set
      metric: critical_uplift
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: skill-implementation-forge
        - type: icontains
          metric: terminal_marker
          value: Skill eval ready
