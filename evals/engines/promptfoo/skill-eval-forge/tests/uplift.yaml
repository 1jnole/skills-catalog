- description: brief-discussed-but-not-accessible
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: brief-discussed-but-not-accessible
    prompt: Author eval coverage for `skill-implementation-forge` from the approved brief we discussed earlier, the current implementation, and the current evals.
    expected_stop: stop_and_ask
    should_trigger: false
  metadata:
    skill_name: skill-eval-forge
    case_bucket: regression
    intent_class: stop_and_ask
    authority_mode: discussed_only
    expected_stop: stop_and_ask
  assert:
    - type: assert-set
      metric: stop_and_ask_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: stop_marker
          value:
            - clarify
            - please provide
            - please specify
        - type: icontains-any
          metric: authority_reason
          value:
            - brief
            - not accessible
            - not inspectable
            - exact reference
        - type: not-icontains
          metric: terminal_absent
          value: Skill eval ready

