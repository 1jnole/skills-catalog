# Acceptance criteria
# - Measure eval-authoring behavior from the current skill contract rather than legacy path-centric phrasing.
# - Keep authority checks, phase-boundary checks, terminal markers, and Promptfoo-native response boundaries load-bearing.
# - Metadata is editorial support for the suite and is not itself normative.

- description: author-evals-from-approved-contract-and-implementation
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: author-evals-from-approved-contract-and-implementation
    prompt: >-
      Author Promptfoo-native eval coverage for `skill-implementation-forge`.
      Use the approved brief artifact at `openspec/specs/skill-implementation-forge/spec.md`,
      the implemented skill package at `packs/core/skill-implementation-forge/SKILL.md`,
      and the active Promptfoo eval context under `evals/engines/promptfoo/skill-implementation-forge/`.
      Those authorities are already accessible and verifiable in the current working context.
      Proceed from them, do not draft YAML inline here, and stop at `Skill eval ready`.
    expected_stop: Skill eval ready
    should_trigger: true
  metadata:
    skill_name: skill-eval-forge
    case_bucket: golden
    intent_class: trigger
    authority_mode: materialized
    expected_stop: Skill eval ready
  assert:
    - type: assert-set
      metric: critical_contract
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: skill-implementation-forge
        - type: icontains-any
          metric: authority_surface
          value:
            - brief
            - implementation
            - eval context
            - promptfoo
        - type: icontains
          metric: terminal_marker
          value: Skill eval ready

