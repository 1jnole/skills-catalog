- description: author-evals-from-approved-contract-and-implementation
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: author-evals-from-approved-contract-and-implementation
    prompt: Author Promptfoo-native eval coverage for `skill-implementation-forge` from its approved contract artifact and existing implementation, then stop at `Skill eval ready`.
    expected_stop: Skill eval ready
    should_trigger: true
  metadata:
    skill_name: skill-eval-forge
    case_bucket: golden
    expected_stop: Skill eval ready
  assert:
    - type: assert-set
      metric: critical_contract
      threshold: 1
      assert:
        - type: icontains
          metric: target_skill
          value: skill-implementation-forge
        - type: icontains
          metric: contract_concept
          value: contract
        - type: icontains
          metric: implementation_concept
          value: implementation
        - type: icontains
          metric: terminal_marker
          value: Skill eval ready
