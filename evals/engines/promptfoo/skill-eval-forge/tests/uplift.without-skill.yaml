- description: author-evals-from-approved-contract-and-implementation
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: author-evals-from-approved-contract-and-implementation
    prompt: >-
      Author Promptfoo-native eval coverage for `skill-implementation-forge`.
      Use the approved contract artifact at `openspec/specs/skill-implementation-forge/spec.md`,
      the existing implementation at `packs/core/skill-implementation-forge/SKILL.md`,
      and the active Promptfoo eval context under `evals/engines/promptfoo/skill-implementation-forge/`.
      Those repo-local inputs are already confirmed and available now, so do not ask to reconfirm them.
      Proceed from those authoritative inputs and stop at the normal completion marker for this phase.
    expected_stop: baseline_only
    should_trigger: false
  metadata:
    skill_name: skill-eval-forge
    case_bucket: golden
    expected_stop: baseline_only
  assert:
    - type: assert-set
      metric: baseline_surface
      threshold: 1
      assert:
        - type: not-icontains-any
          metric: no_skill_owned_terminal_or_boundary
          value:
            - Skill eval ready
            - eval ready
            - evaluation ready
            - coverage ready
            - ready for use
            - ready for execution
            - prepared and integrated for execution
            - active repo eval boundary
            - follow the skill contract
            - per the skill-eval-forge contract
            - stop and ask
        - type: llm-rubric
          metric: semantic_non_impersonation
          provider: openai:gpt-4.1-mini
          value: >-
            Grade whether the assistant stayed an informational baseline rather
            than impersonating an active repo-local skill. Pass only if the
            response stays generic and does not present itself as following a
            local skill boundary, local stop rules, or a skill-owned phase
            completion. Fail if it adopts a skill-owned completion marker, ends
            with a phase-completion formula like "ready" or "complete", or
            treats repo-local artifacts, eval context, or implementation inputs
            as an active authority it is following right now.
          rubricPrompt: |
            [
              {
                "role": "system",
                "content": "You are grading whether a baseline assistant response impersonates an active repo-local skill. Return JSON with keys pass, score, and reason. Pass only if the response stays informational and generic. Fail if it adopts a skill-owned completion marker, uses a phase-completion formula as a terminal marker, presents repo-local boundary framing as active authority, or treats repo-local artifacts and implementation inputs as a local workflow it is currently following."
              },
              {
                "role": "user",
                "content": "User request:\n{{prompt}}\n\nAssistant response:\n{{output}}\n\nRubric:\n{{rubric}}"
              }
            ]
