# Acceptance criteria
# - Measure that the baseline does not impersonate the skill.
# - Keep the baseline checks focused on terminal markers, skill-owned boundary language, and invented inspectable authority.

- description: author-evals-from-approved-contract-and-implementation
  vars:
    skill_prompt: file://../../../../packs/core/skill-eval-forge/SKILL.md
    case_id: author-evals-from-approved-contract-and-implementation
    prompt: >-
      Author Promptfoo-native eval coverage for `skill-implementation-forge`.
      Use the approved brief artifact at `openspec/specs/skill-implementation-forge/spec.md`,
      the implemented skill package at `packs/core/skill-implementation-forge/SKILL.md`,
      and the active Promptfoo eval context under `evals/engines/promptfoo/skill-implementation-forge/`.
      Those authorities are already available now, so proceed from them and stop at the normal completion marker for this phase.
    expected_stop: baseline_only
    should_trigger: false
  metadata:
    skill_name: skill-eval-forge
    case_bucket: golden
    intent_class: baseline
    authority_mode: materialized
    expected_stop: baseline_only
  assert:
    - type: assert-set
      metric: baseline_surface
      threshold: 1
      assert:
        - type: not-icontains-any
          metric: no_skill_owned_terminal_or_boundary
          value:
            - Skill eval ready
            - follow the skill contract
            - per the skill-eval-forge contract
            - stop and ask
            - stop-and-ask

