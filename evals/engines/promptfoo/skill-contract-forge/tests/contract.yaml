      metric: portable_handoff_behavior
      threshold: 1
      assert:
        - type: starts-with
          metric: classification
          value: "Classification: trigger"
        - type: icontains
          metric: workflow
          value: "Workflow: new-skill"
        - type: contains-json
          metric: schema_valid
          value: file://evals/contracts/skill-contract-forge/eval-brief-output.schema.json
        - type: icontains
          metric: source_refs_explicit_empty
          value: '"sourceRefs": []'
        - type: icontains-any
          metric: durable_support_routing
          value:
            - references
            - assets
            - packageShape
            - supportFolders
