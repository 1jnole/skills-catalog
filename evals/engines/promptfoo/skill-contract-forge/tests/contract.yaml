  vars:
    skill_prompt: file://../../../../packs/core/skill-contract-forge/SKILL.md
    case_id: new-skill-packages-durable-support-content
    prompt: >-
      Create a new reusable skill called `planner` for producing one implementation plan before coding starts.
      While freezing the contract, you may inspect repo-local planning notes, examples, and template drafts if they help.
      Do not preserve those local authoring file paths as durable authority in the brief.
