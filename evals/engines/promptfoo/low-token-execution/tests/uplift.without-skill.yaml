- description: workflow-sequence-paraphrased
  vars:
    skill_prompt: file://../../../../packs/core/low-token-execution/SKILL.md
    case_id: workflow-sequence-paraphrased
    prompt: >-
      Freeze the success checklist before heavy work, rerun the narrowest useful check first,
      then widen only after that passes, and close one unit before opening another.
      If you answer without the skill, do not turn that into a numbered procedure or repo-shaped workflow.
      Ask what concrete task that workflow should apply to.
    expected_stop: baseline_only
    should_trigger: false
  metadata:
