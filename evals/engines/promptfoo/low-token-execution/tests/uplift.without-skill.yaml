- description: bounded-multi-step-task-with-frozen-done
  vars:
    skill_prompt: file://../../../../packs/core/low-token-execution/SKILL.md
    case_id: bounded-multi-step-task-with-frozen-done
    prompt: >-
      Use `low-token-execution` for one bounded repo task.
      The active unit is to add the Promptfoo family for `low-token-execution`.
      Freeze `done` as: add the family files, validate the three configs for that family,
      rerun any failing case narrowly before a full rerun, and stop only with `Execution compacted`.
      If you answer without the skill, stay brief and informational rather than outlining a playbook or frozen checklist.
    expected_stop: baseline_only
    should_trigger: false
  metadata:
    skill_name: low-token-execution
    case_bucket: golden
    expected_stop: baseline_only
  assert:
    - type: assert-set
      metric: baseline_surface
      threshold: 1
      assert:
        - type: not-icontains-any
          metric: no_skill_owned_language
          value:
            - Execution compacted
            - compact-execution boundary
            - per the low-token-execution skill
            - follow the low-token-execution contract
            - Classification:
            - Workflow:
        - type: not-icontains-any
          metric: no_repo_playbook
          value:
            - step 1
            - start by
            - freeze `done`
            - freeze done
            - rerun any failing case
            - action plan
