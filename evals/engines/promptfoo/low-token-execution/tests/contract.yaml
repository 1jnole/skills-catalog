- description: bounded-multi-step-task-with-frozen-done
  vars:
    skill_prompt: file://../../../../packs/core/low-token-execution/SKILL.md
    case_id: bounded-multi-step-task-with-frozen-done
    prompt: >-
      Use `low-token-execution` for one bounded repo task.
      The active unit is to add the Promptfoo family for `low-token-execution`.
      Freeze `done` as: add the family files under `evals/engines/promptfoo/low-token-execution/`,
      validate the three configs for that family, rerun any failing case narrowly before a full rerun,
      and finish only by ending with the exact marker `Execution compacted`.
      Keep the work compact and do not reopen the plan unless a real contradiction appears.
      Stay at the routing-and-boundary level here rather than performing file edits in this reply.
    expected_stop: Execution compacted
    should_trigger: true
  metadata:
    skill_name: low-token-execution
    case_bucket: golden
    expected_stop: Execution compacted
  assert:
    - type: assert-set
      metric: trigger_behavior
      threshold: 1
      assert:
        - type: icontains-any
          metric: frozen_done
          value:
            - done
            - checklist
            - frozen
        - type: icontains-any
          metric: focused_verification
          value:
            - narrow
            - focused
            - rerun
            - validate the three configs
        - type: icontains
          metric: terminal_marker
          value: Execution compacted
        - type: not-icontains-any
          metric: no_envelope_drift
          value:
            - Classification:
            - Workflow:
